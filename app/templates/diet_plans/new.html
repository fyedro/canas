{% extends "base.html" %}
{% block title %}Nuevo plan de dieta{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h4><i class="bi bi-plus-circle"></i> Nuevo plan de dieta</h4>
                <form method="post" action="/diet-plans/new">
                    <div class="mb-3">
                        <label class="form-label">Nombre del plan</label>
                        <input type="text" name="nombre" class="form-control" placeholder="Ej: Definición, Volumen, Mantenimiento..." required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción (opcional)</label>
                        <textarea name="descripcion" class="form-control" rows="2" placeholder="Notas de tu preparador..."></textarea>
                    </div>
                    <p class="text-muted small">Después de crear podrás añadir las comidas (desayuno, almuerzo, comida, merienda, cena) con sus alimentos y cantidades.</p>
                    <button type="submit" class="btn btn-warning w-100">Crear plan</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
