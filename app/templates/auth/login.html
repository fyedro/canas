{% extends "base.html" %}
{% block title %}Iniciar sesión{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <h1 class="display-4 text-warning"><i class="bi bi-fire"></i></h1>
                    <h2 class="fw-bold">CAÑAS</h2>
                    <p class="text-muted">Calorías, Abdominales, Ñam, Actividad y Salud</p>
                </div>
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form method="post" action="/auth/login">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required autocomplete="email">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 fw-bold py-2">Entrar</button>
                </form>
                <div class="text-center mt-3">
                    <a href="/auth/register" class="text-decoration-none">¿No tienes cuenta? Regístrate</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
