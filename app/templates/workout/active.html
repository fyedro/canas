{% extends "base.html" %}
{% block title %}Entrenar{% endblock %}
{% block content %}
<div x-data="workoutApp()" x-init="init()" class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h4 class="mb-0">{{ routine.nombre }}</h4>
                <small class="text-muted"><span x-text="elapsed"></span></small>
            </div>
        </div>

        <template x-for="(ex, exIdx) in exercises" :key="exIdx">
            <div class="card mb-3" x-show="exIdx === currentExerciseIndex">
                <div class="card-body">
                    <h5 x-text="ex.exercise_name"></h5>

                    <div class="table-responsive">
                        <table class="table table-dark table-sm mb-2">
                            <thead>
                                <tr>
                                    <th style="width:40px">#</th>
                                    <th>Peso (kg)</th>
                                    <th>Reps</th>
                                    <th style="width:50px">Hecho</th>
                                    <th style="width:30px"></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="(set, sIdx) in ex.sets" :key="sIdx">
                                    <tr :class="{'table-success': set.completed}">
                                        <td class="text-muted small align-middle" x-text="sIdx + 1"></td>
                                        <td>
                                            <input type="number" x-model="set.weight"
                                                   class="form-control form-control-sm" step="0.5" min="0"
                                                   :disabled="set.completed"
                                                   @input="autoSaveSet(exIdx, sIdx)">
                                        </td>
                                        <td>
                                            <input type="number" x-model="set.reps"
                                                   class="form-control form-control-sm" min="0"
                                                   :disabled="set.completed"
                                                   @input="autoSaveSet(exIdx, sIdx)">
                                        </td>
                                        <td class="text-center">
                                            <input type="checkbox" class="form-check-input"
                                                   x-model="set.completed"
                                                   @change="toggleSet(exIdx, sIdx)">
                                        </td>
                                        <td class="text-center">
                                            <button class="btn btn-outline-danger btn-sm py-0 px-1"
                                                    @click="removeSet(exIdx, sIdx)"
                                                    x-show="!set.completed && ex.sets.length > 1">✕</button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>

                    <button class="btn btn-outline-warning btn-sm w-100 mb-2"
                            @click="addSet(exIdx)">
                        <i class="bi bi-plus-lg"></i> Añadir serie
                    </button>

                    <div class="d-flex gap-2">
                        <button class="btn btn-success flex-grow-1"
                                @click="finishExercise(exIdx)"
                                x-show="!allSetsDone(exIdx)">
                            <i class="bi bi-check-lg"></i> Completar ejercicio
                        </button>
                        <button class="btn btn-outline-primary flex-grow-1"
                                @click="nextExercise(exIdx)"
                                x-show="allSetsDone(exIdx) && exIdx < exercises.length - 1">
                            Siguiente ejercicio <i class="bi bi-arrow-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </template>

        <div class="card mb-3 text-center" x-show="showRest">
            <div class="card-body">
                <p class="text-muted mb-1">Descanso</p>
                <div class="display-4 fw-bold text-warning" x-text="restDisplay"></div>
                <div class="d-flex justify-content-center gap-2 mt-2">
                    <button class="btn btn-outline-primary btn-sm" @click="addRest(15)">+15s</button>
                    <button class="btn btn-outline-primary btn-sm" @click="addRest(30)">+30s</button>
                    <button class="btn btn-outline-primary btn-sm" @click="addRest(60)">+60s</button>
                    <button class="btn btn-success btn-sm" @click="skipRest()">Saltar</button>
                </div>
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-body py-2">
                <small class="text-muted">Progreso</small>
                <template x-for="(ex, i) in exercises" :key="i">
                    <div class="d-flex align-items-center gap-2 py-1"
                         :class="{'fw-bold': i === currentExerciseIndex}"
                         style="cursor:pointer" @click="goToExercise(i)">
                        <i class="bi"
                           :class="i < currentExerciseIndex ? 'bi-check-circle-fill text-success' : (i === currentExerciseIndex ? 'bi-play-circle-fill text-warning' : 'bi-circle text-muted')"></i>
                        <span class="small flex-grow-1" x-text="ex.exercise_name"></span>
                        <small class="text-muted" x-text="doneCount(ex) + '/' + ex.sets.length"></small>
                    </div>
                </template>
            </div>
        </div>

        <button class="btn btn-outline-danger w-100" @click="finishWorkout()">
            <i class="bi bi-stop-fill"></i> Finalizar
        </button>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function workoutApp() {
    return {
        exercises: [],
        currentExerciseIndex: 0,
        showRest: false,
        restSeconds: 0,
        restInterval: null,
        elapsed: '00:00',
        elapsedSeconds: 0,
        elapsedInterval: null,
        workoutId: {{ workout.id if workout else 'null' }},
        saveTimer: null,

        init() {
            {% if routine.exercises %}
            this.exercises = [
                {% for re in routine.exercises %}
                {
                    exercise_name: '{{ re.exercise_name|safe }}',
                    sets: [{weight: {{ re.peso or 20 }}, reps: 10, completed: false, saved: false}],
                    _id: 'ex{{ re.id }}',
                },
                {% endfor %}
            ];
            {% endif %}

            this.elapsedInterval = setInterval(() => {
                this.elapsedSeconds++;
                this.elapsed = this.formatTime(this.elapsedSeconds);
            }, 1000);
        },

        doneCount(ex) {
            return ex.sets.filter(s => s.completed).length;
        },

        allSetsDone(exIdx) {
            return this.exercises[exIdx] && this.exercises[exIdx].sets.every(s => s.completed);
        },

        addSet(exIdx) {
            const ex = this.exercises[exIdx];
            const last = ex.sets[ex.sets.length - 1];
            ex.sets.push({
                weight: last ? last.weight : 20,
                reps: last ? last.reps : 10,
                completed: false,
                saved: false,
            });
        },

        removeSet(exIdx, sIdx) {
            const ex = this.exercises[exIdx];
            const set = ex.sets[sIdx];
            if (set.saved) {
                fetch(`/workout/active/{{ workout.id }}/delete-set/${set.id || ''}`, {method: 'POST'});
            }
            ex.sets.splice(sIdx, 1);
        },

        toggleSet(exIdx, sIdx) {
            const set = this.exercises[exIdx].sets[sIdx];
            this.saveSet(exIdx, sIdx);
            if (this.allSetsDone(exIdx)) {
                this.startRest(exIdx);
            }
        },

        autoSaveSet(exIdx, sIdx) {
            clearTimeout(this.saveTimer);
            this.saveTimer = setTimeout(() => this.saveSet(exIdx, sIdx), 500);
        },

        saveSet(exIdx, sIdx) {
            const set = this.exercises[exIdx].sets[sIdx];
            if (!set.dirty && set.saved) return;
            set.saved = true;
            fetch('/workout/active/{{ workout.id }}/save-set', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    exercise_name: this.exercises[exIdx].exercise_name,
                    exercise_order: exIdx,
                    set_number: sIdx + 1,
                    weight: set.weight,
                    reps: set.reps,
                    completed: set.completed,
                })
            });
        },

        finishExercise(exIdx) {
            this.exercises[exIdx].sets.forEach((s, i) => {
                s.completed = true;
                this.saveSet(exIdx, i);
            });
            this.startRest(exIdx);
        },

        nextExercise(exIdx) {
            if (exIdx < this.exercises.length - 1) {
                this.currentExerciseIndex++;
                this.showRest = false;
            }
        },

        goToExercise(index) {
            if (index <= this.currentExerciseIndex) {
                this.currentExerciseIndex = index;
                this.showRest = false;
                if (this.restInterval) clearInterval(this.restInterval);
            }
        },

        startRest(exIdx) {
            const restTime = {{ (routine.exercises[0].rest_time or 90) if routine.exercises else 90 }};
            this.restSeconds = restTime;
            this.showRest = true;
            if (this.restInterval) clearInterval(this.restInterval);
            this.restInterval = setInterval(() => {
                if (this.restSeconds > 0) {
                    this.restSeconds--;
                } else {
                    this.skipRest();
                }
            }, 1000);
        },

        skipRest() {
            this.showRest = false;
            if (this.restInterval) clearInterval(this.restInterval);
            this.restSeconds = 0;
        },

        addRest(sec) {
            this.restSeconds += sec;
        },

        get restDisplay() {
            return this.formatTime(this.restSeconds);
        },

        finishWorkout() {
            if (confirm('¿Finalizar entrenamiento?')) {
                fetch('/workout/active/{{ workout.id }}/finish', {method: 'POST'})
                    .then(r => { if (r.redirected) window.location.href = r.url; });
            }
        },

        formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
        }
    };
}
</script>
{% endblock %}
